[pytest]
# Pytest configuration for IoC Enrichment System tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = .

# Minimum Python version
minversion = 3.12

# Add current directory to Python path
pythonpath = . ../../services/ti-enrichment ../../shared/python

# Command line options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --maxfail=5

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    smoke: marks tests as smoke tests
    grpc: marks tests that test gRPC functionality
    http: marks tests that test HTTP functionality
    enrichment: marks tests for enrichment service
    ioc: marks tests for IoC service
    threat: marks tests for threat service

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Timeout settings
[pytest-timeout]
timeout = 300
timeout_method = thread

# Asyncio settings
[pytest-asyncio]
asyncio_mode = auto

# Logging
[pytest-logging]
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
