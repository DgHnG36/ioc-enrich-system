name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ioc-enrich-system
  GO_VERSION: "1.24"
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────
  # Stage 1: Lint & Unit Tests (parallel)
  # ──────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Lint Go - ioc-core
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/ioc-core
        continue-on-error: true

      - name: Lint Go - ioc-api-gateway
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/ioc-api-gateway
        continue-on-error: true

      - name: Lint Python - ti-enrichment
        run: |
          pip install flake8 black
          cd services/ti-enrichment
          flake8 . --count --max-line-length=120 --statistics --exit-zero
          black . --check --diff --quiet
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Go unit tests - ioc-core
        working-directory: services/ioc-core
        run: |
          go mod download
          go test ./... -v -race -coverprofile=coverage-core.out 2>&1 || true

      - name: Run Go unit tests - ioc-api-gateway
        working-directory: services/ioc-api-gateway
        run: |
          go mod download
          go test ./... -v -race -coverprofile=coverage-gateway.out 2>&1 || true

      - name: Run Python unit tests - ti-enrichment
        working-directory: services/ti-enrichment
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          python -m pytest ../../../test/unit/services/ti-enrichment/ -v --tb=short 2>&1 || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            services/ioc-core/coverage-core.out
            services/ioc-api-gateway/coverage-gateway.out

  # ──────────────────────────────────────────
  # Stage 2: Build Docker Images
  # ──────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, unit-tests]
    strategy:
      matrix:
        include:
          - service: ioc-api-gateway
            dockerfile: services/ioc-api-gateway/Dockerfile
          - service: ioc-core
            dockerfile: services/ioc-core/Dockerfile
          - service: ti-enrichment
            dockerfile: services/ti-enrichment/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Stage 3: Integration Tests
  # ──────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Start all services
        run: docker compose -f docker-compose.yaml up -d --build --wait
        timeout-minutes: 10

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Gateway is healthy!"
              break
            fi
            echo "Attempt $i/60 - waiting..."
            sleep 5
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Go integration tests
        working-directory: test
        env:
          API_GATEWAY_URL: http://localhost:8080
          IOC_CORE_ADDR: localhost:50051
        run: |
          go mod download
          go test ./integration/ -v -timeout 5m 2>&1 || true

      - name: Run Python integration tests
        working-directory: test
        run: |
          pip install -r integration/requirements.txt
          python -m pytest integration/ti_enrichment_integration_test.py -v --tb=short 2>&1 || true

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs > docker-compose-logs.txt 2>&1
          docker compose ps -a

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: docker-compose-logs.txt

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────
  # Stage 4: Security Scan
  # ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd services/ioc-core && govulncheck ./... || true
          cd ../ioc-api-gateway && govulncheck ./... || true

      - name: Python security scan
        run: |
          pip install bandit safety
          cd services/ti-enrichment
          bandit -r . -ll -q || true
          safety check -r requirements.txt || true

  # ──────────────────────────────────────────
  # Final: Status Gate
  # ──────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, build, security]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security: ${{ needs.security.result }}"

          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::Build failed"
            exit 1
          fi
          echo "CI pipeline passed"
