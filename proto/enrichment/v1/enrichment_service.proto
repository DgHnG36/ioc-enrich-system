syntax = "proto3";

package enrichment.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "enrichment/v1/enrichment.proto";

option go_package = "github.com/DgHnG36/ioc_enrichment_service/shared/go/enrichment/v1;enrichmentv1";

service EnrichmentService {
    rpc EnrichIP(EnrichIPRequest) returns (EnrichIPResponse);
    rpc EnrichDomain(EnrichDomainRequest) returns (EnrichDomainResponse);
    rpc EnrichHash(EnrichHashRequest) returns (EnrichHashResponse);
    rpc EnrichURL(EnrichURLRequest) returns (EnrichURLResponse);
    rpc EnrichFilePath(EnrichFilePathRequest) returns (EnrichFilePathResponse);
    rpc Enrich(EnrichRequest) returns (EnrichResponse);
    rpc EnrichBatch(BatchEnrichRequest) returns (BatchEnrichResponse);
    rpc GetReputation(GetReputationRequest) returns (GetReputationResponse);
    rpc StreamEnrich(stream StreamEnrichRequest) returns (stream StreamEnrichResponse);
    rpc CheckSourceHealth(CheckSourceHealthRequest) returns (CheckSourceHealthResponse);
}

message EnrichOptions {
    string has_type = 1;
    bool include_file_metadata = 2;

    bool force_refresh = 3;
}

message EnrichIPRequest {
    string ip = 1;
    repeated EnrichmentSource sources = 2;
    int32 timeout_seconds = 3;
}

message EnrichIPResponse {
    string ip = 1;
    map<string, ThreatIntelData> results = 2;
    AggregatedScore aggregated = 3;
    IPEnrichmentData ip_data = 4;
    google.protobuf.Timestamp enriched_at = 5;
}

message EnrichDomainRequest {
    string domain = 1;
    repeated EnrichmentSource sources = 2;
    int32 timeout_seconds = 3;
}

message EnrichDomainResponse {
    string domain = 1;
    map<string, ThreatIntelData> results = 2;
    AggregatedScore aggregated = 3;
    DomainEnrichmentData domain_data = 4;
    google.protobuf.Timestamp enriched_at = 5;
}

message EnrichHashRequest {
    string hash = 1;
    EnrichOptions options = 2;
    repeated EnrichmentSource sources = 3;
    int32 timeout_seconds = 4;
}

message EnrichHashResponse {
    string hash = 1;
    map<string, ThreatIntelData> results = 2;
    AggregatedScore aggregated = 3;
    HashEnrichmentData hash_data = 4;
    google.protobuf.Timestamp enriched_at = 5;
}

message EnrichURLRequest {
    string url = 1;
    repeated EnrichmentSource sources = 2;
    int32 timeout_seconds = 3;
}

message EnrichURLResponse {
    string url = 1;
    map<string, ThreatIntelData> results = 2;
    AggregatedScore aggregated = 3;
    URLEnrichmentData url_data = 4;
    google.protobuf.Timestamp enriched_at = 5;
}

message EnrichFilePathRequest {
    string file_path = 1;
    repeated EnrichmentSource sources = 2;
    int32 timeout_seconds = 3;
}

message EnrichFilePathResponse {
    string file_path = 1;
    map<string, ThreatIntelData> results = 2;
    AggregatedScore aggregated = 3;
    FilePathEnrichmentData file_path_data = 4;
    google.protobuf.Timestamp enriched_at = 5;
}

message EnrichRequest {
    string value = 1;
    string type = 2;
    repeated EnrichmentSource sources = 3;
    int32 timeout_seconds = 4;
    EnrichOptions options = 5;
}

message EnrichResponse {
    string value = 1;
    string type = 2;
    map<string, ThreatIntelData> results = 3;
    AggregatedScore aggregated = 4;
    google.protobuf.Timestamp enriched_at = 5;
    google.protobuf.Struct raw_details = 6;
}

message BatchEnrichRequest {
    repeated EnrichRequest requests = 1;
    int32 max_concurrency = 2;
}

message BatchEnrichResponse {
    repeated EnrichResponse responses = 1;
    int32 total_count = 2;
    int32 success_count = 3;
    int32 failed_count = 4;
    map<string, string> errors = 5;
}

message GetReputationRequest {
    string value = 1;
    string type = 2;
    repeated EnrichmentSource sources = 3;
}

message GetReputationResponse {
    map<string, float> source_scores = 1;
    AggregatedScore aggregated = 2;
}

message StreamEnrichRequest {
    string request_id = 1;
    EnrichRequest request = 2;
}

message StreamEnrichResponse {
    string request_id = 1;
    oneof result {
        EnrichResponse success = 2;
        string error_message = 3;
    }
}

message CheckSourceHealthRequest {
    repeated EnrichmentSource sources = 1;
}

message CheckSourceHealthResponse {
    map<string, SourceHealth> health_status = 1;
    bool overall_healthy = 3;
}
